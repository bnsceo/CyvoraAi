app = "cyvoraai"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  JARVIS_WORKSPACE_ROOT = "/app"
  MISSIONS_DB_PATH = "/app/data/missions.db"
  TENANTS_ROOT = "/app/tenants"
  AGENCY_AGENTS_DIR = "/app/personas"
  WORKER_POLL_INTERVAL_SECONDS = "15"
  MOCK_MODE = "true"
  ALLOW_PAID_AI = "false"
  CYVORA_BILLING_MODE = "enforce"
  CYVORA_MAX_RUN_COST_USD = "0.25"
  CYVORA_MAX_DAILY_COST_USD = "1.00"
  CYVORA_AUTH_REQUIRED = "true"

[[mounts]]
  source = "cyvora_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
