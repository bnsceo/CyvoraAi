app = "cyvoraai"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  JARVIS_WORKSPACE_ROOT = "/data/cyvora"

[[mounts]]
  source = "cyvora_data"
  destination = "/data/cyvora"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
