name: Cyvora CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply Alpha 1 core bridge migration
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/apply-alpha1-core-bridge.py
          git config user.name 'Cyvora Migration Bot'
          git config user.email 'cyvora-migration@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add core traceability and exact task binding'
          git push origin HEAD:${{ github.head_ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Alpha 1 baseline
        run: npm run verify
