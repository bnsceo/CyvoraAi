name: Cyvora CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply governance verification corrections
        if: github.event_name == 'pull_request' && hashFiles('scripts/fix-governance-verify.py') != ''
        run: |
          python3 scripts/fix-governance-verify.py
          cat > .github/workflows/ci.yml <<'EOF'
          name: Cyvora CI

          on:
            push:
              branches:
                - main
            pull_request:

          jobs:
            verify:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Use Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Verify Alpha 1 baseline
                  run: npm run verify
          EOF
          git config user.name 'Cyvora Verification Bot'
          git config user.email 'cyvora-verification@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve scoped SSE compatibility and clean governance bridge'
          git push origin HEAD:${{ github.head_ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Alpha 1 baseline
        run: npm run verify
