name: Cyvora CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply governance live bridge
        if: github.event_name == 'pull_request' && hashFiles('scripts/apply-governance-live-bridge.py') != ''
        run: |
          rm -f GOVERNANCE_MIGRATION_ERROR.txt
          python3 - <<'PY'
          from pathlib import Path
          p = Path('scripts/apply-governance-live-bridge.py')
          text = p.read_text()
          fixes = {
            '"             approve={approve}\\n"': '"            approve={approve}\\n"',
            '"             openHandshake={openHandshake}\\n"': '"            openHandshake={openHandshake}\\n"',
            '"             approvalError={approvalError}\\n"': '"            approvalError={approvalError}\\n"',
            '"       </div>\\n     </div>\\n   );\\n }"': '"      </div>\\n    </div>\\n  );\\n}"',
            '"                     onClick={() => approve(approval.id)}"': '"                    onClick={() => approve(approval.id)}"',
            '"                     onClick={() => openHandshake(approval)}"': '"                    onClick={() => openHandshake(approval)}"',
            '"                     {approvingId === approval.id ? \'Approving…\' : \'Approve\'}"': '"                    {approvingId === approval.id ? \'Approving…\' : \'Approve\'}"',
            '"                     {approvingId === approval.id ? \'Opening…\' : \'Review & sign\'}"': '"                    {approvingId === approval.id ? \'Opening…\' : \'Review & sign\'}"',
          }
          for old, new in fixes.items():
            text = text.replace(old, new)
          p.write_text(text)
          PY
          set +e
          python3 scripts/apply-governance-live-bridge.py > /tmp/governance-migration.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/governance-migration.log GOVERNANCE_MIGRATION_ERROR.txt
            git config user.name 'Cyvora Migration Bot'
            git config user.email 'cyvora-migration@users.noreply.github.com'
            git add GOVERNANCE_MIGRATION_ERROR.txt
            git commit -m 'chore: capture governance migration error'
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi
          cat > .github/workflows/ci.yml <<'EOF'
          name: Cyvora CI

          on:
            push:
              branches:
                - main
            pull_request:

          jobs:
            verify:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Use Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 20
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Verify Alpha 1 baseline
                  run: npm run verify
          EOF
          git config user.name 'Cyvora Migration Bot'
          git config user.email 'cyvora-migration@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete governance and live frontend backend bridge'
          git push origin HEAD:${{ github.head_ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Alpha 1 baseline
        run: npm run verify
