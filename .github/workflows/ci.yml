name: Cyvora CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Alpha 1 baseline
        run: |
          rm -f GOVERNANCE_VERIFY_ERROR.txt
          set +e
          npm run verify > /tmp/governance-verify.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/governance-verify.log GOVERNANCE_VERIFY_ERROR.txt
            git config user.name 'Cyvora Verification Bot'
            git config user.email 'cyvora-verification@users.noreply.github.com'
            git add GOVERNANCE_VERIFY_ERROR.txt
            git commit -m 'chore: capture governance verification error'
            git push origin HEAD:${{ github.head_ref }}
            exit 1
          fi
