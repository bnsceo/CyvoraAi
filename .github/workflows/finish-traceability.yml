name: Finish traceability migration

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply production traceability and showcase updates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def rep(path, old, new, count=-1, optional=False):
              p=Path(path); t=p.read_text()
              if old not in t:
                  if optional: return
                  raise SystemExit(f'missing expected text in {path}: {old[:80]!r}')
              p.write_text(t.replace(old,new,count))

          p=Path('.gitignore'); t=p.read_text().replace('\n-e \n','\n')
          if '__pycache__/' not in t: t += '\n# Python bytecode\n__pycache__/\n*.pyc\n'
          p.write_text(t)

          rep('lib/db.ts',"import fs from 'fs';\n","import fs from 'fs';\nimport crypto from 'crypto';\n")
          rep('lib/db.ts',"import { workspaceRoot } from './paths';\n","import { workspaceRoot } from './paths';\n\nexport function newTraceId(): string {\n  return `trc_${crypto.randomUUID().replace(/-/g, '').slice(0, 12)}`;\n}\n")
          rep('lib/db.ts',"function ensureColumn(table: string, column: string, definition: string): void {","function ensureColumn(table: string, column: string, definition: string, onReady?: () => void): void {")
          rep('lib/db.ts',"    if (rows.some((row) => row.name === column)) return;\n    db.run(`ALTER TABLE ${table} ADD COLUMN ${column} ${definition}`, (alterErr) => {\n      if (alterErr) console.error(`[db] unable to add ${table}.${column}:`, alterErr);\n    });","    if (rows.some((row) => row.name === column)) { onReady?.(); return; }\n    db.run(`ALTER TABLE ${table} ADD COLUMN ${column} ${definition}`, (alterErr) => {\n      if (alterErr) { console.error(`[db] unable to add ${table}.${column}:`, alterErr); return; }\n      onReady?.();\n    });")
          marker="] .forEach(([table, column, definition]) => ensureColumn(table, column, definition));"
          t=Path('lib/db.ts').read_text()
          actual="] .forEach(([table, column, definition]) => ensureColumn(table, column, definition));" if marker in t else "].forEach(([table, column, definition]) => ensureColumn(table, column, definition));"
          insert=actual+"\n\nfunction backfillLegacyTraceIds(table: 'activity_events' | 'approvals'): void {\n  db.run(`UPDATE ${table} SET trace_id = 'legacy_migration' WHERE trace_id IS NULL`, (err) => {\n    if (err) console.error(`[db] unable to backfill ${table}.trace_id:`, err);\n  });\n}\n\nensureColumn('activity_events', 'trace_id', 'TEXT', () => backfillLegacyTraceIds('activity_events'));\nensureColumn('approvals', 'trace_id', 'TEXT', () => backfillLegacyTraceIds('approvals'));"
          rep('lib/db.ts',actual,insert,1)
          rep('lib/db.ts',"  execution_run_id?: number;\n}): Promise<number> {","  execution_run_id?: number;\n  trace_id?: string;\n}): Promise<number> {",1)
          rep('lib/db.ts',"`INSERT INTO approvals (company_id, task_id, title, summary, status, risk_level, approval_type, subject_type, subject_id, execution_run_id, created_at, updated_at)\n       VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`","`INSERT INTO approvals (company_id, task_id, title, summary, status, risk_level, approval_type, subject_type, subject_id, execution_run_id, trace_id, created_at, updated_at)\n       VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`")
          rep('lib/db.ts',"      data.execution_run_id || null,\n      now,\n      now,","      data.execution_run_id || null,\n      data.trace_id || newTraceId(),\n      now,\n      now,",1)
          rep('lib/db.ts',"  description?: string;\n}): Promise<number> {\n  return new Promise((resolve, reject) => {\n    const stmt = db.prepare(\n      `INSERT INTO activity_events (company_id, event_type, title, description, created_at)\n       VALUES (?, ?, ?, ?, ?)`","  description?: string;\n  trace_id?: string;\n}): Promise<number> {\n  return new Promise((resolve, reject) => {\n    const stmt = db.prepare(\n      `INSERT INTO activity_events (company_id, event_type, title, description, trace_id, created_at)\n       VALUES (?, ?, ?, ?, ?, ?)`")
          rep('lib/db.ts',"      data.description || '',\n      new Date().toISOString(),","      data.description || '',\n      data.trace_id || newTraceId(),\n      new Date().toISOString(),",1)
          rep('lib/db.ts',"db.run(`INSERT INTO activity_events (company_id, event_type, title, description, created_at) VALUES (?, 'result_approved', ?, ?, ?)`, [data.company_id, `Result approval #${data.approval_id} completed`, 'Candidate output was accepted and finalized by the founder approval flow.', timestamp]","db.run(`INSERT INTO activity_events (company_id, event_type, title, description, trace_id, created_at) VALUES (?, 'result_approved', ?, ?, ?, ?)`, [data.company_id, `Result approval #${data.approval_id} completed`, 'Candidate output was accepted and finalized by the founder approval flow.', newTraceId(), timestamp]")

          rep('components/CompanyDetailSurface.tsx',"type Approval = { id: number; title: string; summary?: string; status: string; risk_level?: string };","type Approval = { id: number; title: string; summary?: string; status: string; risk_level?: string; trace_id?: string };")
          rep('components/CompanyDetailSurface.tsx',"type ActivityEvent = { id: number; event_type: string; title: string; description?: string; created_at: string };","type ActivityEvent = { id: number; event_type: string; title: string; description?: string; created_at: string; trace_id?: string };")
          rep('components/CompanyDetailSurface.tsx',"/** Presentational-only reference, since activity_events has no trace_id column yet. */\nfunction eventRef(id: number) {\n  return `evt_${id.toString().padStart(4, '0')}`;\n}\n","const LEGACY_TRACE_VALUE = 'legacy_migration';\n\nfunction traceDisplay(traceId?: string): { label: string; legacy: boolean } {\n  if (!traceId || traceId === LEGACY_TRACE_VALUE) return { label: 'Legacy', legacy: true };\n  return { label: traceId, legacy: false };\n}\n")
          p=Path('components/CompanyDetailSurface.tsx'); p.write_text(p.read_text().replace('eventRef(event.id)','traceDisplay(event.trace_id).label'))

          for path in ('worker/execution_worker.py','worker/supervisor_router.py'):
              rep(path,'import sys\n','import sys\nimport uuid\n',1)
              rep(path,"def now() -> str:\n    return datetime.now(timezone.utc).isoformat()\n","def now() -> str:\n    return datetime.now(timezone.utc).isoformat()\n\n\ndef new_trace_id() -> str:\n    return f\"trc_{uuid.uuid4().hex[:12]}\"\n",1)
              p=Path(path); t=p.read_text()
              t=t.replace('INSERT INTO activity_events (company_id, event_type, title, description, created_at)\n        VALUES (?, ?, ?, ?, ?)','INSERT INTO activity_events (company_id, event_type, title, description, trace_id, created_at)\n        VALUES (?, ?, ?, ?, ?, ?)')
              t=t.replace('event_type, title, description, now()),','event_type, title, description, new_trace_id(), now()),')
              p.write_text(t)
          p=Path('worker/execution_worker.py'); t=p.read_text()
          t=t.replace("execution_run_id, created_at, updated_at)\n               VALUES (?, ?, ?, ?, 'pending', ?, 'result_acceptance', 'output', ?, ?, ?, ?)","execution_run_id, trace_id, created_at, updated_at)\n               VALUES (?, ?, ?, ?, 'pending', ?, 'result_acceptance', 'output', ?, ?, ?, ?, ?)")
          t=t.replace('risk, output_id, run["id"], now(), now()),','risk, output_id, run["id"], new_trace_id(), now(), now()),')
          p.write_text(t)

          p=Path('docs/product-tour.html'); t=p.read_text()
          t=t.replace('<div class="sidebar-foot"><strong>Safe preview</strong><p>Seeded data. No secrets or external writes.</p></div>','<div class="sidebar-foot"><strong>Production architecture preview</strong><p>Real OS surfaces and governance contracts. External writes remain approval-gated.</p></div>')
          t=t.replace('<span class="status-pill">System healthy</span><span class="status-pill">Approval gated</span>','<span class="status-pill">Runtime healthy</span><span class="status-pill">Traceable</span><span class="status-pill">Approval gated</span>')
          t=t.replace('Decisions, incidents, active work, and consequential changes—without dashboard noise.','Operate objectives, companies, agents, approvals, executions, incidents, and institutional memory through one governed control plane.')
          t=t.replace('data-trace="CYV-','data-trace="trc_').replace('<h2>Active missions</h2>','<h2>Live execution posture</h2>')
          p.write_text(t)
          PY

          cat > docs/FRONTEND_BACKEND_BRIDGE.md <<'EOF'
          # Cyvora Frontend ↔ Backend Bridge

          ## Current bridge
          - Company details load from `/api/companies/:id`.
          - Approvals post through `/api/approvals/:id`.
          - Activity and approvals persist real `trc_<12-hex>` TraceIDs.
          - Node and Python worker insertion paths share one trace convention.
          - Company detail remains one reusable responsive component.

          ## Remaining, in priority order
          1. Company-scoped SSE and an `EventSource` subscription in `CompanyDetailSurface`.
          2. Canonical machine-state transition events instead of regex inference.
          3. Intent vs. Plan approval handshake with a separate founder Signature artifact.
          4. TraceIDs on tasks, execution runs, outputs, validation, usage, incidents, and recovery actions.
          5. Tenant-scope validation audit for every incoming entity ID.
          6. Explicit execution-run-to-task binding.
          7. Encrypted backend secret storage and real sandboxed connector adapters.
          8. PostgreSQL, production auth/RBAC, deployed queues/workers, observability, backups, and end-to-end tests.
          EOF

          rm -rf .cyvora-import
          rm -f .github/workflows/apply-traceability-fast.yml .github/workflows/kick-traceability.yml .github/workflows/finish-traceability.yml

      - name: Validate and commit
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run build
          python3 -m py_compile worker/execution_worker.py worker/supervisor_router.py
          git config user.name 'Cyvora Import Bot'
          git config user.email 'cyvora-import@users.noreply.github.com'
          git add -A
          git commit -m 'feat: persist traceability and align production showcase'
          git push origin HEAD:main
