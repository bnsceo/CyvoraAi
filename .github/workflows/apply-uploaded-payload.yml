name: Apply uploaded Cyvora payload

on:
  push:
    branches:
      - feature/import-uploaded-company-war-room
    paths:
      - '.cyvora-import/**'
      - '.github/workflows/apply-uploaded-payload.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/import-uploaded-company-war-room

      - name: Reconstruct uploaded payload
        shell: bash
        run: |
          set -euo pipefail
          cat .cyvora-import/payload-part-* | base64 --decode > /tmp/cyvora-payload.tar.gz
          echo 'f6b0de2ca3ab8c62de00f10717d5dfdafe1b00a65962c95ecec6ac231e131be9  /tmp/cyvora-payload.tar.gz' | sha256sum --check
          mkdir -p /tmp/cyvora-payload
          tar -xzf /tmp/cyvora-payload.tar.gz -C /tmp/cyvora-payload

      - name: Copy supplied CompanyDetailSurface package
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/cyvora-payload/package/app/companies/page.tsx app/companies/page.tsx
          cp /tmp/cyvora-payload/package/components/CompanyDetailSurface.tsx components/CompanyDetailSurface.tsx
          cp /tmp/cyvora-payload/package/lib/stateMachine.ts lib/stateMachine.ts
          cp /tmp/cyvora-payload/package/lib/useBreakpoint.ts lib/useBreakpoint.ts
          cp /tmp/cyvora-payload/package/lib/useOverlayA11y.ts lib/useOverlayA11y.ts

      - name: Apply supplied database and War Room patches
        shell: bash
        run: |
          set -euo pipefail
          git apply --3way /tmp/cyvora-payload/0001.patch
          git apply --3way /tmp/cyvora-payload/0002.patch
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo 'Unresolved patch conflicts:'
            git diff --name-only --diff-filter=U
            exit 1
          fi

      - name: Remove one-time staging files
        shell: bash
        run: |
          rm -rf .cyvora-import
          rm -f .github/workflows/apply-uploaded-payload.yml

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit supplied implementation
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Cyvora Import Bot'
          git config user.email 'cyvora-import@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'feat: import governed company detail and War Room systems'
          git push origin HEAD:feature/import-uploaded-company-war-room
