name: Apply uploaded Cyvora payload

on:
  push:
    branches:
      - feature/import-uploaded-company-war-room
    paths:
      - '.cyvora-import/**'
      - '.github/workflows/apply-uploaded-payload.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/import-uploaded-company-war-room

      - name: Reconstruct uploaded payload
        shell: bash
        run: |
          set -euo pipefail
          cat .cyvora-import/payload-part-* | base64 --decode > /tmp/cyvora-payload.tar.gz
          echo 'f6b0de2ca3ab8c62de00f10717d5dfdafe1b00a65962c95ecec6ac231e131be9  /tmp/cyvora-payload.tar.gz' | sha256sum --check
          mkdir -p /tmp/cyvora-payload
          tar -xzf /tmp/cyvora-payload.tar.gz -C /tmp/cyvora-payload

      - name: Copy supplied CompanyDetailSurface package
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/cyvora-payload/package/app/companies/page.tsx app/companies/page.tsx
          cp /tmp/cyvora-payload/package/components/CompanyDetailSurface.tsx components/CompanyDetailSurface.tsx
          cp /tmp/cyvora-payload/package/lib/stateMachine.ts lib/stateMachine.ts
          cp /tmp/cyvora-payload/package/lib/useBreakpoint.ts lib/useBreakpoint.ts
          cp /tmp/cyvora-payload/package/lib/useOverlayA11y.ts lib/useOverlayA11y.ts

      - name: Apply supplied database initialization fix
        shell: bash
        run: |
          set -euo pipefail
          git apply --3way /tmp/cyvora-payload/0001.patch

      - name: Diagnose supplied governed War Room patch
        id: warroom
        continue-on-error: true
        shell: bash
        run: |
          set +e
          git apply --reject --whitespace=nowarn /tmp/cyvora-payload/0002.patch
          code=$?
          mkdir -p /tmp/warroom-diagnostic/rejects /tmp/warroom-diagnostic/files
          find . -name '*.rej' -print > /tmp/warroom-diagnostic/rejected-files.txt
          while IFS= read -r reject; do
            [ -n "$reject" ] || continue
            cp --parents "$reject" /tmp/warroom-diagnostic/rejects/
            source_file="${reject%.rej}"
            [ -f "$source_file" ] && cp --parents "$source_file" /tmp/warroom-diagnostic/files/
          done < /tmp/warroom-diagnostic/rejected-files.txt
          cp /tmp/cyvora-payload/0002.patch /tmp/warroom-diagnostic/
          git status --short > /tmp/warroom-diagnostic/git-status.txt
          echo "$code" > /tmp/warroom-diagnostic/exit-code.txt
          exit "$code"

      - name: Upload War Room conflict diagnostic
        if: steps.warroom.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: warroom-patch-diagnostic
          path: /tmp/warroom-diagnostic
          if-no-files-found: error

      - name: Stop when War Room patch needs reconciliation
        if: steps.warroom.outcome == 'failure'
        run: exit 1

      - name: Remove one-time staging files
        shell: bash
        run: |
          rm -rf .cyvora-import
          rm -f .github/workflows/apply-uploaded-payload.yml

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit supplied implementation
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Cyvora Import Bot'
          git config user.email 'cyvora-import@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'feat: import governed company detail and War Room systems'
          git push origin HEAD:feature/import-uploaded-company-war-room
