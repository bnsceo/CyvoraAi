name: Cyvora GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static showcase
        run: |
          rm -rf .github/pages
          mkdir -p .github/pages
          cp docs/cyvora-full-app-showcase.html .github/pages/index.html
          cp docs/product-tour.html .github/pages/product-tour.html
          if [ -d docs/assets ]; then
            cp -R docs/assets .github/pages/assets
          fi
          if [ -f docs/assets/brand/cyvora-og-preview.webp ]; then
            cp docs/assets/brand/cyvora-og-preview.webp .github/pages/og-cyvora.webp
          elif [ -f public/cyvora-logo.png ]; then
            cp public/cyvora-logo.png .github/pages/og-cyvora.png
          fi
          touch .github/pages/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .github/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
